<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo-hss.png">
  <title>Survey Kepuasan Pegawai</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Source Sans 3', sans-serif; }
    .aspect-radio input:checked + label { border-color: #1e3a5f; background: #eef2f7; box-shadow: 0 0 0 2px #1e3a5f; }
    .satisfaction-radio input:checked + label.sat-4 { border-color: #16a34a; background: #f0fdf4; box-shadow: 0 0 0 2px #16a34a; }
    .satisfaction-radio input:checked + label.sat-3 { border-color: #65a30d; background: #f7fee7; box-shadow: 0 0 0 2px #65a30d; }
    .satisfaction-radio input:checked + label.sat-2 { border-color: #ca8a04; background: #fefce8; box-shadow: 0 0 0 2px #ca8a04; }
    .satisfaction-radio input:checked + label.sat-1 { border-color: #dc2626; background: #fef2f2; box-shadow: 0 0 0 2px #dc2626; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }
  </style>
</head>
<body class="h-full bg-gray-100">
  <div class="min-h-full py-10" style="background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);">
    <header class="text-center mb-8">
      <div class="flex justify-end px-6 mb-4">
        <a href="hasil.html" class="bg-white text-blue-900 text-sm font-bold px-4 py-2 rounded-lg shadow hover:bg-blue-50 transition"> Lihat Hasil 📊</a>
      </div>
      <img src="https://i.ibb.co.com/7tVffqZN/logo-hss.png" alt="logo" class="mx-auto w-20 mb-4">
      <h1 class="text-white text-xl md:text-2xl font-bold px-4 uppercase">Survey Kepuasan Pegawai 2026</h1>
    </header>

    <main class="max-w-4xl mx-auto px-4">
      <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-8">
        <form id="survey-form" class="space-y-8">
          <!-- Aspek -->
          <fieldset>
            <legend class="text-lg font-bold text-gray-800 mb-4">Aspek Pelayanan</legend>
            <div id="aspek-error" class="hidden text-red-500 text-sm mb-2">⚠ Pilih salah satu aspek.</div>
            <div class="space-y-2 aspect-radio">
              <input type="radio" name="pelayanan" id="p1" value="Aspek Pelayanan Administrasi Umum" class="sr-only"><label for="p1" class="block border p-3 rounded-lg cursor-pointer">Aspek Pelayanan Administrasi Umum</label>
              <input type="radio" name="pelayanan" id="p2" value="Aspek Pelayanan Kepegawaian" class="sr-only"><label for="p2" class="block border p-3 rounded-lg cursor-pointer">Aspek Pelayanan Kepegawaian</label>
              <input type="radio" name="pelayanan" id="p3" value="Aspek Pelayanan Keuangan" class="sr-only"><label for="p3" class="block border p-3 rounded-lg cursor-pointer">Aspek Pelayanan Keuangan</label>
              <input type="radio" name="pelayanan" id="p4" value="Aspek Pelayanan Perencanaan" class="sr-only"><label for="p4" class="block border p-3 rounded-lg cursor-pointer">Aspek Pelayanan Perencanaan</label>
            </div>
          </fieldset>

          <!-- Kepuasan -->
          <fieldset>
            <legend class="text-lg font-bold text-gray-800 mb-4">Tingkat Kepuasan</legend>
            <div id="kepuasan-error" class="hidden text-red-500 text-sm mb-2">⚠ Pilih tingkat kepuasan.</div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 satisfaction-radio">
              <input type="radio" name="kepuasan" id="k4" value="4" class="sr-only"><label for="k4" class="sat-4 border rounded-xl p-4 text-center cursor-pointer">😀 Sangat Baik</label>
              <input type="radio" name="kepuasan" id="k3" value="3" class="sr-only"><label for="k3" class="sat-3 border rounded-xl p-4 text-center cursor-pointer">🙂 Baik</label>
              <input type="radio" name="kepuasan" id="k2" value="2" class="sr-only"><label for="k2" class="sat-2 border rounded-xl p-4 text-center cursor-pointer">😐 Cukup</label>
              <input type="radio" name="kepuasan" id="k1" value="1" class="sr-only"><label for="k1" class="sat-1 border rounded-xl p-4 text-center cursor-pointer">☹️ Kurang</label>
            </div>
          </fieldset>

          <!-- Saran -->
          <fieldset>
            <legend class="text-lg font-bold text-gray-800 mb-2">Kritik & Saran</legend>
            <textarea id="feedback" class="w-full border-2 rounded-lg p-3 focus:outline-none focus:border-blue-500" rows="4" placeholder="Masukkan saran Anda..."></textarea>
          </fieldset>

          <button type="submit" id="submit-btn" class="w-full bg-[#1e3a5f] text-white py-4 rounded-xl font-bold hover:bg-blue-800 transition flex justify-center items-center gap-2">
            <span id="btn-text">Kirim Penilaian</span>
            <div id="btn-spinner" class="hidden spinner w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const form = document.getElementById('survey-form');
    const API_URL = "ISI_URL_WEB_APP_ANDA_DISINI";

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const pelayanan = form.querySelector('input[name="pelayanan"]:checked');
      const kepuasan = form.querySelector('input[name="kepuasan"]:checked');
      const feedback = document.getElementById('feedback').value.trim();

      if (!pelayanan || !kepuasan) {
        Swal.fire('Oops!', 'Mohon lengkapi pilihan Anda.', 'warning');
        return;
      }

      if ((kepuasan.value <= 2) && feedback === "") {
        Swal.fire('Perhatian', 'Mohon berikan saran/kritik untuk penilaian ini.', 'info');
        return;
      }

      document.getElementById('submit-btn').disabled = true;
      document.getElementById('btn-text').textContent = 'Mengirim...';
      document.getElementById('btn-spinner').classList.remove('hidden');

      const formData = new URLSearchParams();
      formData.append("Aspek Pelayanan", pelayanan.value);
      formData.append("Tingkat Kepuasan", kepuasan.value);
      formData.append("Saran atau Kritik", feedback);

      fetch(API_URL, { method: "POST", body: formData })
      .then(() => {
        Swal.fire('Berhasil!', 'Terima kasih atas penilaian Anda.', 'success').then(() => location.reload());
      })
      .catch(() => {
        Swal.fire('Gagal', 'Terjadi kesalahan koneksi.', 'error');
        document.getElementById('submit-btn').disabled = false;
      });
    });
    lucide.createIcons();
  </script>
</body>
</html>
