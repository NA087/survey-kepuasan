<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo-hss.png" />
  <link rel="shortcut icon" href="logo-hss.png" />
  <title>Survey Kepuasan Pegawai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .animate-gradient { background: linear-gradient(-45deg, #1e3a8a, #2563eb, #3b82f6, #60a5fa); background-size: 400% 400%; animation: gradient 15s ease infinite; }
    .rating-btn.active { background-color: #2563eb !important; color: white !important; transform: scale(1.1); border-color: #1e40af; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
    .loading-spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid white; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="animate-gradient min-h-screen flex items-center justify-center p-4 md:p-8 font-sans">
  <div class="w-full max-w-2xl bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-white/20">
    <div class="bg-blue-600 p-8 text-center relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
      <img src="logo-hss.png" alt="Logo HSS" class="w-20 h-24 mx-auto mb-4 drop-shadow-lg relative z-10">
        <h1 class="text-lg sm:text-xl md:text-2xl lg:text-3xl font-bold text-white leading-relaxed px-4">
          SURVEY KEPUASAN PEGAWAI PADA LAYANAN INTERNAL <br class="hidden md:block">
          DINAS PERTANIAN, PERIKANAN, DAN PANGAN KABUPATEN HSS 2026
        </h1>
        <p class="mt-3 text-sm text-blue-300/80">
          Survey ini bersifat anonim. Data digunakan untuk peningkatan kualitas layanan internal.
        </p>
    </div>

    <form id="surveyForm" class="p-8 space-y-8">
      <div>
        <label class="block text-gray-800 text-lg font-bold mb-4 flex items-center gap-2">
          <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-lg flex items-center justify-center text-sm">01</span>
          Aspek Pelayanan
        </label>
        <div class="relative">
          <select id="pelayanan" name="pelayanan" required class="w-full bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-4 text-gray-700 font-medium focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all outline-none appearance-none cursor-pointer">
            <option value="" disabled selected>Pilih aspek yang ingin dinilai...</option>
            <option value="Kualitas Jaringan Internet">Kualitas Jaringan Internet</option>
            <option value="Kebersihan Ruangan & Lingkungan">Kebersihan Ruangan & Lingkungan</option>
            <option value="Ketersediaan ATK & Sarana">Ketersediaan ATK & Sarana</option>
            <option value="Sistem Keamanan & Parkir">Sistem Keamanan & Parkir</option>
            <option value="Fasilitas Ibadah & Toilet">Fasilitas Ibadah & Toilet</option>
          </select>
          <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-gray-800 text-lg font-bold mb-4 flex items-center gap-2">
          <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-lg flex items-center justify-center text-sm">02</span>
          Tingkat Kepuasan
        </label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <button type="button" onclick="setRating(1)" class="rating-btn group p-4 border-2 border-gray-100 rounded-2xl hover:border-blue-400 hover:bg-blue-50 transition-all duration-300 text-center">
            <span class="block text-3xl mb-2 group-hover:scale-125 transition-transform">😞</span>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Buruk</span>
          </button>
          <button type="button" onclick="setRating(2)" class="rating-btn group p-4 border-2 border-gray-100 rounded-2xl hover:border-blue-400 hover:bg-blue-50 transition-all duration-300 text-center">
            <span class="block text-3xl mb-2 group-hover:scale-125 transition-transform">😐</span>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Cukup</span>
          </button>
          <button type="button" onclick="setRating(3)" class="rating-btn group p-4 border-2 border-gray-100 rounded-2xl hover:border-blue-400 hover:bg-blue-50 transition-all duration-300 text-center">
            <span class="block text-3xl mb-2 group-hover:scale-125 transition-transform">😊</span>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Baik</span>
          </button>
          <button type="button" onclick="setRating(4)" class="rating-btn group p-4 border-2 border-gray-100 rounded-2xl hover:border-blue-400 hover:bg-blue-50 transition-all duration-300 text-center">
            <span class="block text-3xl mb-2 group-hover:scale-125 transition-transform">😍</span>
            <span class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Sangat Baik</span>
          </button>
        </div>
        <input type="hidden" id="kepuasan" name="kepuasan" required>
      </div>

      <div>
        <label class="block text-gray-800 text-lg font-bold mb-4 flex items-center gap-2">
          <span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-lg flex items-center justify-center text-sm">03</span>
          Saran atau Kritik
        </label>
        <textarea id="feedback" name="Saran atau Kritik" placeholder="Tulis saran atau kritik Anda di sini..." class="w-full border-2 border-gray-200 rounded-2xl px-5 py-4 text-gray-700 placeholder-gray-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all outline-none resize-none bg-gray-50 font-medium" rows="4"></textarea>
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-200 transition-all duration-300 transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3 text-lg uppercase tracking-wider">
        <span>Kirim Penilaian</span>
        <svg id="sendIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        <div id="loading" class="loading-spinner hidden"></div>
      </button>

      <div class="text-center pt-4">
        <a href="hasil.html" class="inline-flex items-center gap-2 text-blue-600 font-bold hover:text-blue-800 transition-colors group">
          📊 Lihat Hasil Survey Sementara
          <span class="group-hover:translate-x-1 transition-transform">→</span>
        </a>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzg0Sc34wbc1ylDflmSoxSJxvhjHxvBG-6zlu5AQCRw6KoOYR9gdZmfj16XQngumhrtQQ/exec";
    let selectedRating = 0;

    function setRating(val) {
      selectedRating = val;
      document.getElementById('kepuasan').value = val;
      document.querySelectorAll('.rating-btn').forEach((btn, idx) => {
        if (idx + 1 === val) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    document.getElementById('surveyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pelayanan = document.getElementById('pelayanan');
      const kepuasan = document.getElementById('kepuasan');
      const feedback = document.getElementById('feedback').value;
      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');
      const sendIcon = document.getElementById('sendIcon');

      if (!pelayanan.value || !kepuasan.value) {
        Swal.fire({ icon: 'warning', title: 'Oops...', text: 'Mohon lengkapi semua penilaian!', borderRadius: '20px' });
        return;
      }

      submitBtn.disabled = true;
      loading.classList.remove('hidden');
      sendIcon.classList.add('hidden');

      try {
        const formData = new URLSearchParams();
        formData.append('Aspek Pelayanan', pelayanan.value);
        formData.append('Tingkat Kepuasan', kepuasan.value);
        formData.append('Saran atau Kritik', feedback);

        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData,
        });

        if (response.ok) {
          Swal.fire({
            icon: 'success',
            title: 'Terima Kasih!',
            text: 'Penilaian Anda sangat berharga bagi kami.',
            confirmButtonColor: '#2563eb',
            confirmButtonText: 'Sama-sama',
          }).then(() => {
            document.getElementById('surveyForm').reset();
            setRating(0);
          });
        } else {
          throw new Error('Gagal mengirim data');
        }
      } catch (error) {
        Swal.fire({ icon: 'error', title: 'Gagal', text: 'Terjadi kesalahan, silakan coba lagi nanti.' });
      } finally {
        submitBtn.disabled = false;
        loading.classList.add('hidden');
        sendIcon.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
