<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Hasil Survey</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="min-h-screen pb-10" style="background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);">
  
  <!-- Header & Filter -->
  <div class="max-w-4xl mx-auto px-6 pt-8 pb-4 flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center gap-2">
      <select id="filter-bulan" class="p-2 rounded-lg border text-sm">
        <option value="">Semua Bulan</option>
        <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option><option value="04">April</option>
        <option value="05">Mei</option><option value="06">Juni</option><option value="07">Juli</option><option value="08">Agustus</option>
        <option value="09">September</option><option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
      </select>
      <select id="filter-tahun" class="p-2 rounded-lg border text-sm">
        <option value="2026">2026</option><option value="2025">2025</option>
      </select>
      <button onclick="muatData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">🔍 Filter</button>
    </div>
    <a href="index.html" class="bg-white text-blue-600 border border-blue-600 text-sm font-bold px-4 py-2 rounded-lg">⬅ Kembali</a>
  </div>

  <!-- Konten Laporan -->
  <div class="max-w-4xl mx-auto p-6" id="content">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div id="pdf-header" class="hidden mb-6 text-center border-b-2 pb-4">
        <h2 class="font-bold uppercase">Laporan Kepuasan Internal</h2>
        <p>Dinas Pertanian, Perikanan, dan Pangan HSS</p>
      </div>

      <h1 class="text-2xl font-bold text-center mb-8 text-gray-800">Hasil Survey Kepuasan Pegawai</h1>

      <div id="skm-box" class="hidden mb-8">
        <div id="skm-card" class="rounded-2xl p-8 text-center text-white shadow-lg bg-blue-600">
          <div class="text-sm opacity-90 uppercase tracking-widest">Indeks Kepuasan</div>
          <div id="skm-value" class="text-6xl font-bold my-2">0</div>
          <div id="skm-kategori" class="text-xl font-semibold"></div>
        </div>
      </div>

      <div id="total" class="text-center font-bold text-gray-600 mb-8"></div>

      <div id="loading" class="text-center py-10">
        <p class="animate-pulse">Sedang mengambil data...</p>
      </div>

      <div id="result" class="space-y-4 hidden"></div>

      <div id="pdf-footer" class="hidden mt-12 grid grid-cols-2 gap-4 text-center text-xs pt-10 border-t">
        <div>Mengetahui,<br><br><br><br><b>Kepala Dinas</b></div>
        <div>Kandangan, 2026<br><br><br><br><b>Admin Sistem</b></div>
      </div>

      <div id="download-area" class="text-center mt-10 hidden">
        <button onclick="downloadPDF()" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold shadow-lg hover:bg-green-700">📄 Download Laporan PDF</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "AKfycbz8g1qKM_J_pMFI4Egr4bQ2jqlS-u6Qe-xcxj1KRwmuzbErgkv8IKonD6oyE9chJwlKpw";

    function muatData() {
      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("result").classList.add("hidden");
      document.getElementById("skm-box").classList.add("hidden");
      document.getElementById("download-area").classList.add("hidden");

      const bln = document.getElementById("filter-bulan").value;
      const thn = document.getElementById("filter-tahun").value;
      const FINAL_URL = `${API_URL}?bulan=${bln}&tahun=${thn}`;

      fetch(FINAL_URL).then(res => res.json()).then(res => {
        const data = res.responses;
        const p = res.penilaian;

        document.getElementById("total").innerHTML = `Total Responden: ${p.total}`;
        document.getElementById("skm-value").innerText = p.skm.toFixed(2);
        document.getElementById("skm-kategori").innerText = p.kategori;

        const card = document.getElementById("skm-card");
        card.className = "rounded-2xl p-8 text-center text-white shadow-lg " + 
          (p.skm >= 80 ? "bg-green-600" : p.skm >= 70 ? "bg-blue-600" : "bg-red-600");

        let html = "";
        const counts = {};
        data.forEach(row => { counts[row["Aspek Pelayanan"]] = (counts[row["Aspek Pelayanan"]] || 0) + 1; });

        Object.keys(counts).forEach(aspek => {
          const persen = ((counts[aspek] / data.length) * 100).toFixed(1);
          html += `<div class="bg-gray-50 p-4 rounded-lg border">
            <div class="flex justify-between font-bold text-sm mb-2"><span>${aspek}</span><span>${counts[aspek]} Responden</span></div>
            <div class="w-full bg-gray-200 h-2 rounded-full"><div class="bg-blue-500 h-2 rounded-full" style="width:${persen}%"></div></div>
          </div>`;
        });

        document.getElementById("result").innerHTML = html || "<p class='text-center'>Tidak ada data.</p>";
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");
        document.getElementById("skm-box").classList.remove("hidden");
        document.getElementById("download-area").classList.remove("hidden");
      });
    }

    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');
      document.getElementById('pdf-header').classList.remove('hidden');
      document.getElementById('pdf-footer').classList.remove('hidden');
      document.getElementById('download-area').classList.add('hidden');

      html2canvas(document.getElementById('content')).then(canvas => {
        const img = canvas.toDataURL('image/png');
        doc.addImage(img, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        doc.save("Laporan_Survey.pdf");
        document.getElementById('pdf-header').classList.add('hidden');
        document.getElementById('pdf-footer').classList.add('hidden');
        document.getElementById('download-area').classList.remove('hidden');
      });
    }

    window.onload = muatData;
  </script>
</body>
</html>
