<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo-hss.png" />
  <link rel="shortcut icon" href="logo-hss.png" />
  <title>Laporan Hasil Survey</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; height: 40px; width: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; display: inline-block; }
    /* Transisi halus saat warna berubah */
    #skm-card { transition: background-color 0.5s ease; }
  </style>
</head>
<body class="min-h-screen pb-10" style="background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);">
  
  <!-- Header & Filter -->
  <div class="max-w-4xl mx-auto px-6 pt-8 pb-4 flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <select id="filter-bulan" class="p-2 rounded-lg border border-blue-300 text-sm outline-none">
        <option value="">Semua Bulan</option>
        <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option><option value="04">April</option>
        <option value="05">Mei</option><option value="06">Juni</option><option value="07">Juli</option><option value="08">Agustus</option>
        <option value="09">September</option><option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
      </select>
      <select id="filter-tahun" class="p-2 rounded-lg border border-blue-300 text-sm outline-none">
        <option value="2026">2026</option><option value="2025">2025</option>
      </select>
      <button onclick="muatData()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md">🔍 Filter</button>
    </div>
    <a href="index.html" class="bg-white text-blue-600 border border-blue-600 text-sm font-bold px-4 py-2 rounded-lg hover:bg-blue-50">⬅ Kembali</a>
  </div>

  <!-- Konten Laporan -->
  <div class="max-w-4xl mx-auto p-4 md:p-6" id="content">
    <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-10">
      
      <div id="pdf-header-img" class="hidden mb-6">
        <img src="kop-dinas.PNG" alt="Kop Dinas" class="w-full h-auto">
      </div>

      <h1 class="text-2xl font-extrabold text-center mb-8 text-gray-800">aHasil Survey Kepuasan Pegawai</h1>

      <!-- Skor Indeks (SKM) -->
      <div id="skm-box" class="hidden mb-10">
        <!-- Hapus class warna default di sini agar diatur sepenuhnya oleh JS -->
        <div id="skm-card" class="rounded-2xl p-8 text-center text-white shadow-lg">
          <div class="text-sm opacity-90 uppercase tracking-widest font-semibold">Indeks Kepuasan</div>
          <div id="skm-value" class="text-7xl font-black my-2">0</div>
          <div id="skm-kategori" class="text-xl font-bold"></div>
        </div>
      </div>

      <div id="total" class="text-center font-bold text-gray-500 mb-8 text-lg"></div>

      <div id="loading" class="text-center py-20">
        <div class="spinner mb-4"></div>
        <p class="text-blue-900 font-medium animate-pulse">Mengambil data...</p>
      </div>

      <div id="result" class="space-y-5 hidden"></div>

      <div id="pdf-footer" class="hidden mt-16 grid grid-cols-2 gap-4 text-center text-sm pt-10">
        <div>Mengetahui,<br><br><br><br><br><b>Kepala Dinas</b></div>
        <div>Kandangan, <span id="current-date"></span><br><br><br><br><br><b>Admin Sistem</b></div>
      </div>

      <div id="download-area" class="text-center mt-12 hidden">
        <button onclick="downloadPDF()" class="bg-green-600 text-white px-8 py-4 rounded-xl font-bold shadow-xl hover:bg-green-700 transition-all mx-auto flex items-center justify-center gap-2">
          📄 Download Laporan PDF
        </button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = "https://script.google.com/macros/s/AKfycbysSs0ASsWFCpqQ-v5XwahlDDLk4vp8VNk1Th0MZNQgyyOb4tDaJ2cCH1aW2B_h1Wgf1Q/exec";

    function muatData() {
      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("result").classList.add("hidden");
      document.getElementById("skm-box").classList.add("hidden");
      document.getElementById("download-area").classList.add("hidden");

      const bln = document.getElementById("filter-bulan").value;
      const thn = document.getElementById("filter-tahun").value;
      const FINAL_URL = `${API_BASE_URL}?bulan=${bln}&tahun=${thn}`;

      fetch(FINAL_URL)
        .then(res => res.json())
        .then(res => {
          const data = res.responses || [];
          const p = res.penilaian || { total: 0, skm: 0, kategori: "N/A" };

          document.getElementById("total").innerText = `Total: ${p.total} Responden`;
          document.getElementById("skm-value").innerText = Number(p.skm).toFixed(2);
          document.getElementById("skm-kategori").innerText = p.kategori;

          const card = document.getElementById("skm-card");
          const teksKategori = String(p.kategori).toUpperCase(); 

          // RESET CLASS WARNA (Penting!)
          card.classList.remove("bg-green-600", "bg-blue-600", "bg-yellow-500", "bg-red-600", "bg-gray-500");

          // LOGIKA WARNA YANG LEBIH KUAT
          if (teksKategori.startsWith("A")) {
            card.classList.add("bg-green-600");
          } else if (teksKategori.startsWith("B")) {
            card.classList.add("bg-blue-600");
          } else if (teksKategori.startsWith("C")) {
            card.classList.add("bg-yellow-500");
          } else if (teksKategori.startsWith("D")) {
            card.classList.add("bg-red-600");
          } else {
            card.classList.add("bg-gray-500");
          }

          let html = "";
          const counts = {};
          data.forEach(row => { 
            const key = row["Aspek Pelayanan"];
            if(key) counts[key] = (counts[key] || 0) + 1; 
          });

          Object.keys(counts).forEach(aspek => {
            const persen = data.length > 0 ? ((counts[aspek] / data.length) * 100).toFixed(1) : 0;
            html += `
              <div class="bg-gray-50 p-5 rounded-xl border border-gray-200">
                <div class="flex justify-between font-bold text-gray-700 text-sm mb-3">
                  <span>${aspek}</span>
                  <span class="text-blue-600">${counts[aspek]} Pegawai</span>
                </div>
                <div class="w-full bg-gray-200 h-3 rounded-full overflow-hidden">
                  <div class="bg-blue-500 h-full rounded-full" style="width:${persen}%"></div>
                </div>
              </div>`;
          });

          document.getElementById("result").innerHTML = html || "<p class='text-center py-10'>Tidak ada data pada periode ini.</p>";
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("result").classList.remove("hidden");
          document.getElementById("skm-box").classList.remove("hidden");
          if(data.length > 0) document.getElementById("download-area").classList.remove("hidden");
        })
        .catch(err => {
          document.getElementById("loading").innerHTML = `<p class="text-red-500">Gagal memuat data.</p>`;
        });
    }

    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const originalContent = document.getElementById('content');
      const tempClone = originalContent.cloneNode(true);
      
      Object.assign(tempClone.style, {
        position: "absolute", left: "-9999px", top: "0",
        width: originalContent.offsetWidth + "px", background: "white"
      });

      document.body.appendChild(tempClone);
      const pdfHeader = tempClone.querySelector('#pdf-header-img');
      const pdfFooter = tempClone.querySelector('#pdf-footer');
      const downloadBtn = tempClone.querySelector('#download-area');

      if (pdfHeader) pdfHeader.classList.remove('hidden');
      if (pdfFooter) pdfFooter.classList.remove('hidden');
      if (downloadBtn) downloadBtn.remove();

      const dateSpan = tempClone.querySelector('#current-date');
      if (dateSpan) dateSpan.innerText = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

      setTimeout(() => {
        html2canvas(tempClone, { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
          const imgData = canvas.toDataURL('image/png');
          const pdf = new jsPDF('p', 'mm', 'a4');
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
          pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
          pdf.save(`Laporan_Survey_${new Date().getTime()}.pdf`);
          document.body.removeChild(tempClone);
        });
      }, 400); 
    }

    window.onload = muatData;
  </script>
</body>
</html>
