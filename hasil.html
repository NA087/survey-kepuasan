<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo-hss.png">
  <link rel="shortcut icon" href="logo-hss.png">
  <title>Hasil Survey</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen" style="background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);">

<!-- Tombol kembali -->
<div class="w-full flex justify-end p-4">
  <a href="index.html" 
     class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow hover:bg-blue-700 transition">
    ⬅ Kembali ke Survey
  </a>
</div>

<div class="max-w-4xl mx-auto p-6">
  <div class="bg-white rounded-2xl shadow-xl p-6 animate-fadeIn">

    <h1 class="text-2xl font-bold text-center mb-6">
      Hasil Survey Kepuasan Pegawai
    </h1>

    <div id="total" class="text-center mb-6 text-gray-600"></div>

    <div id="loading" class="text-center py-10">
  <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mx-auto mb-3"></div>
  <p class="text-gray-500">Memuat data...</p>
</div>

<div id="result" class="space-y-4 hidden"></div>

  </div>
</div>
<p class="text-center text-xs text-blue-300/60 mt-6 pb-4">© 2025 Dinas Pertanian, Perikanan, dan Pangan</p>
<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyEjiheHtdTotKn4v9ZsaloKtfTvDWdwQSJ3JjHCfuy-Ws2vXAHCesgNJLpewNXR7Tv/exec";

// Ambil data
fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    const counts = {};

    // Hitung jumlah per aspek
    data.forEach(row => {
      const aspek = row["Aspek Pelayanan"];
      if (!counts[aspek]) counts[aspek] = 0;
      counts[aspek]++;
    });

    const total = data.length;

    document.getElementById("total").innerHTML =
      `Total Responden: <b>${total}</b>`;

    // Ubah ke array + hitung persen
    let result = Object.keys(counts).map(key => {
      return {
        nama: key,
        jumlah: counts[key],
        persen: ((counts[key] / total) * 100).toFixed(1)
      };
    });

    // Urutkan terbesar
    result.sort((a, b) => b.jumlah - a.jumlah);
    const loading = document.getElementById("loading");
    const container = document.getElementById("result");

    // Render HTML
    let html = "";

    result.forEach((item, index) => {

      let rankIcon = "";
      if (index === 0) rankIcon = "🥇";
      else if (index === 1) rankIcon = "🥈";
      else if (index === 2) rankIcon = "🥉";

      let barColor = "bg-blue-600";
      if (index === 0) barColor = "bg-green-600";
      else if (index === 1) barColor = "bg-yellow-500";
      else if (index === 2) barColor = "bg-orange-500";

      html += `
        <div class="bg-white p-4 rounded-xl shadow">

          <div class="flex justify-between mb-2">
            <div class="font-semibold">
              ${rankIcon} ${item.nama}
            </div>
            <div>
              ${item.jumlah} responden (${item.persen}%)
            </div>
          </div>

          <div class="w-full bg-gray-200 rounded-full h-3">
            <div class="${barColor} h-3 rounded-full"
                 style="width: ${item.persen}%"></div>
          </div>

        </div>
      `;
    });

    container.innerHTML = html;
loading.classList.add("hidden");
container.classList.remove("hidden");
  })
.catch(err => {
  document.getElementById("loading").innerHTML =
    "<p class='text-red-500'>Gagal mengambil data</p>";
});

</script>
<style>
  @keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-fadeIn {
  animation: fadeIn 0.5s ease-out;
}
</style>
</body>
</html>
