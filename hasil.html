<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo-hss.png">
  <title>Hasil Survey</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen" style="background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);">

<!-- Tombol kembali -->
<div class="w-full flex justify-end p-4">
  <a href="index.html" 
     class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow hover:bg-blue-700 transition">
    ⬅ Kembali ke Survey
  </a>
</div>

<div class="max-w-5xl mx-auto p-6">
  <div class="bg-white rounded-2xl shadow-xl p-6 animate-fadeIn">

    <h1 class="text-2xl font-bold text-center mb-6">
      Hasil Survey Kepuasan Pegawai Tahun 2026
    </h1>

    <!-- SKM PREMIUM -->
    <div id="skm-box" class="mb-6 hidden">
      <div id="skm-card" class="rounded-2xl p-6 text-center text-white shadow-lg transition-all duration-500">
        
        <div class="text-sm opacity-80">Nilai SKM</div>
        
        <div id="skm-value" class="text-5xl font-bold mt-2">0</div>
        
        <div id="skm-kategori" class="text-lg font-semibold mt-2"></div>

      </div>
    </div>

    <div id="total" class="text-center mb-6 text-gray-600"></div>

    <!-- Loading -->
    <div id="loading" class="text-center py-10">
      <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mx-auto mb-3"></div>
      <p class="text-gray-500">Memuat data...</p>
    </div>

    <!-- Result -->
    <div id="result" class="space-y-4 hidden"></div>

  </div>
</div>

<p class="text-center text-xs text-blue-300/60 mt-6 pb-4">
© 2026 Dinas Pertanian, Perikanan, dan Pangan Kabupaten Hulu Sungai Selatan
</p>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwqjL9qGOXGgO7quL4JYWpkYtyXkX0ZyuyjFD8bWMdEBHxImtM1LvxPFzZnnE7tUwoQxA/exec";

fetch(API_URL)
  .then(res => res.json())
  .then(res => {

    const data = res.responses;
    const penilaian = res.penilaian;

    // ===== TOTAL =====
    document.getElementById("total").innerHTML =
      `Total Responden: <b>${penilaian.total}</b>`;

    // ===== WARNA KATEGORI =====
    let color = "bg-blue-600";

    if (penilaian.kategori.includes("A")) color = "bg-green-600";
    else if (penilaian.kategori.includes("B")) color = "bg-blue-600";
    else if (penilaian.kategori.includes("C")) color = "bg-yellow-500";
    else if (penilaian.kategori.includes("D")) color = "bg-red-600";

    const skmCard = document.getElementById("skm-card");
    skmCard.classList.add(color);

    document.getElementById("skm-kategori").innerText = penilaian.kategori;

    // ===== ANIMASI ANGKA =====
    let current = 0;
    const target = penilaian.skm;
    const el = document.getElementById("skm-value");

    const interval = setInterval(() => {
      current += Math.ceil(target / 30);
      if (current >= target) {
        current = target;
        clearInterval(interval);
      }
      el.innerText = current;
    }, 30);

    document.getElementById("skm-box").classList.remove("hidden");

    // ===== GRAFIK =====
    const counts = {};

    data.forEach(row => {
      const aspek = row["Aspek Pelayanan"];
      if (!counts[aspek]) counts[aspek] = 0;
      counts[aspek]++;
    });

    const total = data.length;

    let result = Object.keys(counts).map(key => {
      return {
        nama: key,
        jumlah: counts[key],
        persen: ((counts[key] / total) * 100).toFixed(1)
      };
    });

    result.sort((a, b) => b.jumlah - a.jumlah);

    const loading = document.getElementById("loading");
    const container = document.getElementById("result");

    let html = "";

    result.forEach((item, index) => {

      let rankIcon = "";
      if (index === 0) rankIcon = "🥇";
      else if (index === 1) rankIcon = "🥈";
      else if (index === 2) rankIcon = "🥉";

      html += `
        <div class="bg-white p-4 rounded-xl shadow">

          <div class="flex justify-between mb-2">
            <div class="font-semibold">
              ${rankIcon} ${item.nama}
            </div>
            <div>
              ${item.jumlah} responden (${item.persen}%)
            </div>
          </div>

          <div class="w-full bg-gray-200 rounded-full h-3">
            <div class="bg-blue-600 h-3 rounded-full"
                 style="width: ${item.persen}%"></div>
          </div>

        </div>
      `;
    });

    container.innerHTML = html;
    loading.classList.add("hidden");
    container.classList.remove("hidden");

  })
.catch(() => {
  document.getElementById("loading").innerHTML =
    "<p class='text-red-500'>Gagal mengambil data</p>";
});

</script>

<style>
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-fadeIn {
  animation: fadeIn 0.5s ease-out;
}
</style>

</body>
</html>
