<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="logo-hss.png" />
  <link rel="shortcut icon" href="logo-hss.png" />
  <title>Laporan Hasil Survey</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      animation: spin 0.8s linear infinite;
      height: 40px;
      width: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
    }
  </style>
</head>

<body class="min-h-screen pb-10" style="background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 50%, #1e3a5f 100%);">

<!-- HEADER -->
<div class="max-w-4xl mx-auto px-6 pt-8 pb-4 flex flex-wrap items-center justify-between gap-4">
  <div class="flex items-center gap-3">

    <!-- ✅ FULL BULAN -->
    <select id="filter-bulan" class="p-2 rounded-lg border text-sm">
      <option value="">Semua Bulan</option>
      <option value="01">Januari</option>
      <option value="02">Februari</option>
      <option value="03">Maret</option>
      <option value="04">April</option>
      <option value="05">Mei</option>
      <option value="06">Juni</option>
      <option value="07">Juli</option>
      <option value="08">Agustus</option>
      <option value="09">September</option>
      <option value="10">Oktober</option>
      <option value="11">November</option>
      <option value="12">Desember</option>
    </select>

    <select id="filter-tahun" class="p-2 rounded-lg border text-sm">
      <option value="2026">2026</option>
      <option value="2025">2025</option>
    </select>

    <button onclick="muatData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">
      🔍 Filter
    </button>
  </div>

  <a href="index.html" class="bg-white px-4 py-2 rounded-lg border">⬅ Kembali</a>
</div>

<!-- CONTENT -->
<div class="max-w-4xl mx-auto p-4 md:p-6" id="content">
  <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-10">

    <div id="pdf-header-img" class="hidden mb-2">
      <img src="kop-dinas.PNG" class="w-full">
    </div>

    <h1 class="text-2xl font-extrabold text-center mb-4 text-gray-800">
      Hasil Survey Kepuasan Pegawai
    </h1>

    <div id="loading" class="text-center py-20">
      <div class="spinner"></div>
      <p>Mengambil data...</p>
    </div>

    <div id="data-container" class="hidden">

      <!-- SKM -->
      <div id="skm-box" class="mb-6">
        <div id="skm-card" class="rounded-2xl p-6 text-center text-white shadow-lg flex flex-col items-center justify-center" style="min-height: 200px;">
          <div class="text-sm mb-1">Indeks Kepuasan</div>
          <div id="skm-value" class="text-7xl font-black mb-1" style="line-height:0.9;">0</div>
          <div id="skm-kategori" class="text-xl font-bold mt-1"></div>
        </div>
      </div>

      <div id="total" class="text-center font-bold text-gray-500 mb-8 text-lg"></div>
      <div id="result" class="space-y-5"></div>

    </div>

    <div id="pdf-footer" class="hidden mt-16 text-center">
      Kandangan, <span id="current-date"></span>
    </div>

    <div id="download-area" class="text-center mt-12 hidden">
      <button onclick="downloadPDF()" class="bg-green-600 text-white px-6 py-3 rounded-lg">
        Download PDF
      </button>
    </div>

  </div>
</div>

<script>
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwMCYLpYqQjD1o9SoIA0L9Xgi5C9uwQMC54UDIFKlSveIWSne7KD_P9AYwVK1sQShmrNQ/exec";

function muatData() {
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("data-container").classList.add("hidden");

  const bln = document.getElementById("filter-bulan").value;
  const thn = document.getElementById("filter-tahun").value;

  fetch(`${API_BASE_URL}?bulan=${bln}&tahun=${thn}`)
    .then(res => res.json())
    .then(res => {
      const data = res.responses || [];
      const p = res.penilaian || {};

      document.getElementById("total").innerText = `Total: ${p.total} Responden`;
      document.getElementById("skm-value").innerText = Number(p.skm).toFixed(2);
      document.getElementById("skm-kategori").innerText = p.kategori;

      document.getElementById("loading").classList.add("hidden");
      document.getElementById("data-container").classList.remove("hidden");
      document.getElementById("download-area").classList.remove("hidden");
    });
}

function downloadPDF() {
  const { jsPDF } = window.jspdf;

  const originalContent = document.getElementById('content');
  const tempClone = originalContent.cloneNode(true);

  Object.assign(tempClone.style, {
    position: "absolute",
    left: "-9999px",
    width: originalContent.offsetWidth + "px",
    background: "white"
  });

  document.body.appendChild(tempClone);

  // 🔥 RAPATKAN PDF
  const container = tempClone.querySelector('.bg-white');
  if (container) container.style.paddingTop = "10px";

  const title = tempClone.querySelector('h1');
  if (title) title.style.marginBottom = "8px";

  const skmCard = tempClone.querySelector('#skm-card');
  if (skmCard) {
    skmCard.style.minHeight = "150px";
    skmCard.style.padding = "15px";
  }

  // tampilkan header/footer
  tempClone.querySelector('#pdf-header-img').classList.remove('hidden');
  tempClone.querySelector('#pdf-footer').classList.remove('hidden');
  tempClone.querySelector('#download-area').remove();

  tempClone.querySelector('#current-date').innerText =
    new Date().toLocaleDateString('id-ID');

  setTimeout(() => {
    html2canvas(tempClone, { scale: 2 }).then(canvas => {
      const pdf = new jsPDF();
      const img = canvas.toDataURL("image/png");

      const width = pdf.internal.pageSize.getWidth();
      const height = (canvas.height * width) / canvas.width;

      pdf.addImage(img, 'PNG', 0, 0, width, height);
      pdf.save("laporan.pdf");

      document.body.removeChild(tempClone);
    });
  }, 500);
}

window.onload = muatData;
</script>

</body>
</html>
